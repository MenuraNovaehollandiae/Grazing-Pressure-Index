<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <link rel="stylesheet" href="css/leaflet.css">
  <link rel="stylesheet" href="css/qgis2web.css">
  <link rel="stylesheet" href="css/fontawesome-all.min.css">

  <style>
    html, body, #map {
      width: 100%;
      height: 100%;
      padding: 0;
      margin: 0;
    }

    .leaflet-control-layers {
      font-family: Arial, sans-serif;
      font-size: 13px;
      z-index: 10000;
    }

    .gpi-legend {
      position: absolute;
      bottom: 30px;
      right: 20px;
      z-index: 9999;
      background: rgba(255, 255, 255, 0.94);
      padding: 12px 14px;
      border-radius: 6px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.35);
      font-family: Arial, sans-serif;
      font-size: 12px;
      line-height: 1.25;
      width: 360px;
    }

    .gpi-legend h3 {
      margin: 0 0 8px 0;
      font-size: 15px;
    }

    .gpi-scale {
      position: relative;
      width: 100%;
      height: 52px;
    }

    .gpi-ramp {
      height: 18px;
      width: 100%;
      border: 1px solid #666;
      box-sizing: border-box;
      background: linear-gradient(
        to right,
        #fff5f0 0%,
        #fee0d2 13%,
        #fcbba1 26%,
        #fc9272 39%,
        #fb6a4a 52%,
        #ef3b2c 65%,
        #cb181d 78%,
        #a50f15 90%,
        #67000d 100%
      );
    }

    .gpi-value {
      position: absolute;
      top: 23px;
      font-size: 11px;
      color: #333;
      white-space: nowrap;
    }

    .gpi-value.low {
      left: 0;
    }

    .gpi-value.mid {
      left: 51%;
      transform: translateX(-50%);
    }

    .gpi-value.high {
      right: 0;
    }

    .gpi-word {
      position: absolute;
      top: 38px;
      font-size: 11px;
      color: #333;
      white-space: nowrap;
    }

    .gpi-word.low {
      left: 0;
    }

    .gpi-word.mid {
      left: 51%;
      transform: translateX(-50%);
    }

    .gpi-word.high {
      right: 0;
    }

    .gpi-note {
      margin-top: 8px;
      color: #444;
      font-size: 11px;
    }

    /* Plain polygon label: no white box, no border */
    .bioregion-label {
      background: transparent;
      border: none;
      box-shadow: none;
      color: #323232;
      font-family: "Open Sans", Arial, sans-serif;
      font-size: 10pt;
      font-weight: normal;
      padding: 0;
      text-shadow:
        -1px -1px 1px white,
         1px -1px 1px white,
        -1px  1px 1px white,
         1px  1px 1px white;
    }

    .bioregion-label::before {
      display: none;
    }
  </style>

  <title>Living Landscape grazing pressure index map</title>
</head>

<body>
  <div id="map"></div>

  <script src="js/qgis2web_expressions.js"></script>
  <script src="js/leaflet.js"></script>
  <script src="js/leaflet.rotatedMarker.js"></script>
  <script src="js/leaflet.pattern.js"></script>
  <script src="js/leaflet-hash.js"></script>
  <script src="js/Autolinker.min.js"></script>
  <script src="data/Riverland_biosphere_2.js"></script>

  <script>
    var map = L.map('map', {
      zoomControl: false,
      maxZoom: 28,
      minZoom: 1
    }).fitBounds([
      [-34.28773779654518, 139.4491247844524],
      [-32.919980913059405, 141.54175630316348]
    ]);

    var hash = new L.Hash(map);

    map.attributionControl.setPrefix(
      '<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a>' +
      ' &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a>' +
      ' &middot; <a href="https://qgis.org">QGIS</a>'
    );

    L.control.zoom({
      position: 'topleft'
    }).addTo(map);

    L.control.scale({
      position: 'bottomleft',
      metric: true,
      imperial: false,
      maxWidth: 200
    }).addTo(map);

    var bounds_group = new L.featureGroup([]);

    function setBounds() {
      if (bounds_group.getLayers().length) {
        map.fitBounds(bounds_group.getBounds());
      }
    }

    /* ESRI World Imagery */
    map.createPane('pane_ESRIworldimagery_0');
    map.getPane('pane_ESRIworldimagery_0').style.zIndex = 400;

    var layer_ESRIworldimagery_0 = L.tileLayer(
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      {
        pane: 'pane_ESRIworldimagery_0',
        opacity: 1.0,
        attribution: 'Tiles © Esri',
        minZoom: 1,
        maxZoom: 28,
        minNativeZoom: 0,
        maxNativeZoom: 18
      }
    );

    map.addLayer(layer_ESRIworldimagery_0);

    /* Grazing pressure raster */
    map.createPane('pane_Mapped_grazing_pressure_index_1');
    map.getPane('pane_Mapped_grazing_pressure_index_1').style.zIndex = 401;

    var img_Mapped_grazing_pressure_index_1 = 'data/Mapped_grazing_pressure_index_1.png';

    var img_bounds_Mapped_grazing_pressure_index_1 = [
      [-34.16660613519922, 139.88028207045699],
      [-33.043755114952255, 141.09068598054864]
    ];

    var layer_Mapped_grazing_pressure_index_1 = new L.imageOverlay(
      img_Mapped_grazing_pressure_index_1,
      img_bounds_Mapped_grazing_pressure_index_1,
      {
        pane: 'pane_Mapped_grazing_pressure_index_1',
        opacity: 0.75
      }
    );

    bounds_group.addLayer(layer_Mapped_grazing_pressure_index_1);
    map.addLayer(layer_Mapped_grazing_pressure_index_1);

    /* Riverland Biosphere boundary and labels */
    function style_Riverland_biosphere_2_0() {
      return {
        pane: 'pane_Riverland_biosphere_2',
        opacity: 1,
        color: 'rgba(255,255,255,1.0)',
        dashArray: '5.0,1.0',
        lineCap: 'butt',
        lineJoin: 'miter',
        weight: 1.0,
        fill: true,
        fillOpacity: 0,
        fillColor: 'rgba(190,207,80,0.0)',
        interactive: false
      };
    }

    map.createPane('pane_Riverland_biosphere_2');
    map.getPane('pane_Riverland_biosphere_2').style.zIndex = 402;
    map.getPane('pane_Riverland_biosphere_2').style['mix-blend-mode'] = 'normal';

    var layer_Riverland_biosphere_2 = new L.geoJson(json_Riverland_biosphere_2, {
      attribution: '',
      interactive: false,
      dataVar: 'json_Riverland_biosphere_2',
      layerName: 'layer_Riverland_biosphere_2',
      pane: 'pane_Riverland_biosphere_2',
      style: style_Riverland_biosphere_2_0,
      onEachFeature: function(feature, layer) {
        if (feature.properties && feature.properties['LOC_NAME']) {
          layer.bindTooltip(
            String(feature.properties['LOC_NAME']),
            {
              permanent: true,
              direction: 'center',
              className: 'bioregion-label',
              opacity: 1,
              interactive: false
            }
          );
        }
      }
    });

    bounds_group.addLayer(layer_Riverland_biosphere_2);
    map.addLayer(layer_Riverland_biosphere_2);

    /* Toggle control */
    var baseMaps = {
      "ESRI World Imagery": layer_ESRIworldimagery_0
    };

    var overlayMaps = {
      "Mapped grazing pressure index": layer_Mapped_grazing_pressure_index_1,
      "Riverland Biosphere boundary and labels": layer_Riverland_biosphere_2
    };

    L.control.layers(baseMaps, overlayMaps, {
      collapsed: false,
      position: 'topright'
    }).addTo(map);

    setBounds();
  </script>

  <div class="gpi-legend">
    <h3>Grazing pressure index</h3>

    <div class="gpi-scale">
      <div class="gpi-ramp"></div>

      <div class="gpi-value low">0</div>
      <div class="gpi-value mid">0.24</div>
      <div class="gpi-value high">0.47</div>

      <div class="gpi-word low">Low</div>
      <div class="gpi-word mid">Moderate</div>
      <div class="gpi-word high">High</div>
    </div>

    <div class="gpi-note">
      Darker red indicates greater inferred grazing pressure associated with persistent or nearby artificial water points.
    </div>
  </div>
</body>
</html>
