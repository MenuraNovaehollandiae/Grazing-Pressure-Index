<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
		.gpi-legend {
  position: absolute;
  bottom: 30px;
  right: 20px;
  z-index: 9999;
  background: rgba(255, 255, 255, 0.94);
  padding: 12px 14px;
  border-radius: 6px;
  box-shadow: 0 1px 5px rgba(0,0,0,0.35);
  font-family: Arial, sans-serif;
  font-size: 12px;
  line-height: 1.25;
  width: 270px;
}

.gpi-legend h3 {
  margin: 0 0 8px 0;
  font-size: 15px;
}

.gpi-scale {
  position: relative;
  width: 100%;
  height: 48px;
}

.gpi-ramp {
  height: 18px;
  width: 100%;
  border: 1px solid #666;
  background: linear-gradient(
    to right,
    #fff5f0 0%,
    #fee0d2 13%,
    #fcbba1 26%,
    #fc9272 39%,
    #fb6a4a 52%,
    #ef3b2c 65%,
    #cb181d 78%,
    #a50f15 90%,
    #67000d 100%
  );
}

.gpi-label {
  position: absolute;
  top: 23px;
  font-size: 11px;
  color: #444;
  white-space: nowrap;
}

.gpi-label.low {
  left: 0;
}

.gpi-label.mid {
  left: 51%;
  transform: translateX(-50%);
}

.gpi-label.high {
  right: 0;
}

.gpi-text-label {
  position: absolute;
  top: 36px;
  font-size: 11px;
  color: #444;
  white-space: nowrap;
}

.gpi-text-label.low {
  left: 0;
}

.gpi-text-label.mid {
  left: 51%;
  transform: translateX(-50%);
}

.gpi-text-label.high {
  right: 0;
}

.gpi-note {
  margin-top: 8px;
  color: #444;
  font-size: 11px;
}        </style>
        <title></title>
    </head>
    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/Riverland_biosphere_2.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[-34.28773779654518,139.4491247844524],[-32.919980913059405,141.54175630316348]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
			L.control.scale({
    position: 'bottomleft',
    metric: true,
    imperial: false,
    maxWidth: 200
}).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_ESRIworldimagery_0');
        map.getPane('pane_ESRIworldimagery_0').style.zIndex = 400;
        var layer_ESRIworldimagery_0 = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            pane: 'pane_ESRIworldimagery_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 18
        });
        layer_ESRIworldimagery_0;
        map.addLayer(layer_ESRIworldimagery_0);
        map.createPane('pane_Mapped_grazing_pressure_index_1');
        map.getPane('pane_Mapped_grazing_pressure_index_1').style.zIndex = 401;
        var img_Mapped_grazing_pressure_index_1 = 'data/Mapped_grazing_pressure_index_1.png';
        var img_bounds_Mapped_grazing_pressure_index_1 = [[-34.16660613519922,139.88028207045699],[-33.043755114952255,141.09068598054864]];
        var layer_Mapped_grazing_pressure_index_1 = new L.imageOverlay(img_Mapped_grazing_pressure_index_1,
                                              img_bounds_Mapped_grazing_pressure_index_1,
                                              {pane: 'pane_Mapped_grazing_pressure_index_1'});
        bounds_group.addLayer(layer_Mapped_grazing_pressure_index_1);
        map.addLayer(layer_Mapped_grazing_pressure_index_1);
        function pop_Riverland_biosphere_2(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['LC_PLY_PID'] !== null ? autolinker.link(String(feature.properties['LC_PLY_PID']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['LOC_PID'] !== null ? autolinker.link(String(feature.properties['LOC_PID']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['DT_CREATE'] !== null ? autolinker.link(String(feature.properties['DT_CREATE']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['LOC_NAME'] !== null ? autolinker.link(String(feature.properties['LOC_NAME']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['LOC_CLASS'] !== null ? autolinker.link(String(feature.properties['LOC_CLASS']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['STATE'] !== null ? autolinker.link(String(feature.properties['STATE']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['RESTYPE'] !== null ? autolinker.link(String(feature.properties['RESTYPE']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['RESCODE'] !== null ? autolinker.link(String(feature.properties['RESCODE']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['BLOCKNR'] !== null ? autolinker.link(String(feature.properties['BLOCKNR']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['RESNAME'] !== null ? autolinker.link(String(feature.properties['RESNAME']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['UNIQUEID'] !== null ? autolinker.link(String(feature.properties['UNIQUEID']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['PARENTID'] !== null ? autolinker.link(String(feature.properties['PARENTID']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['SHAPE_AREA'] !== null ? autolinker.link(String(feature.properties['SHAPE_AREA']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['SHAPE_LEN'] !== null ? autolinker.link(String(feature.properties['SHAPE_LEN']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['name'] !== null ? autolinker.link(String(feature.properties['name']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['layer'] !== null ? autolinker.link(String(feature.properties['layer']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['path'] !== null ? autolinker.link(String(feature.properties['path']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_Riverland_biosphere_2_0() {
            return {
                pane: 'pane_Riverland_biosphere_2',
                opacity: 1,
                color: 'rgba(255,255,255,1.0)',
                dashArray: '5.0,1.0',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1.0, 
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(190,207,80,0.0)',
                interactive: true,
            }
        }
        map.createPane('pane_Riverland_biosphere_2');
        map.getPane('pane_Riverland_biosphere_2').style.zIndex = 402;
        map.getPane('pane_Riverland_biosphere_2').style['mix-blend-mode'] = 'normal';
        var layer_Riverland_biosphere_2 = new L.geoJson(json_Riverland_biosphere_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_Riverland_biosphere_2',
            layerName: 'layer_Riverland_biosphere_2',
            pane: 'pane_Riverland_biosphere_2',
            onEachFeature: pop_Riverland_biosphere_2,
            style: style_Riverland_biosphere_2_0,
        });
bounds_group.addLayer(layer_Riverland_biosphere_2);
map.addLayer(layer_Riverland_biosphere_2);

var baseMaps = {
    "ESRI World Imagery": layer_ESRIworldimagery_0
};

var overlayMaps = {
    "Mapped grazing pressure index": layer_Mapped_grazing_pressure_index_1,
    "Riverland Biosphere boundary": layer_Riverland_biosphere_2
};

L.control.layers(baseMaps, overlayMaps, {
    collapsed: false
}).addTo(map);

setBounds();
        var i = 0;
        layer_Riverland_biosphere_2.eachLayer(function(layer) {
            var context = {
                feature: layer.feature,
                variables: {}
            };
            layer.bindTooltip((layer.feature.properties['LOC_NAME'] !== null?String('<div style="color: #323232; font-size: 10pt; font-family: \'Open Sans\', sans-serif;">' + layer.feature.properties['LOC_NAME']) + '</div>':''), {permanent: true, offset: [-0, -16], className: 'css_Riverland_biosphere_2'});
            labels.push(layer);
            totalMarkers += 1;
              layer.added = true;
              addLabel(layer, i);
              i++;
        });
        L.ImageOverlay.include({
            getBounds: function () {
                return this._bounds;
            }
        });
        resetLabels([layer_Riverland_biosphere_2]);
        map.on("zoomend", function(){
            resetLabels([layer_Riverland_biosphere_2]);
        });
        map.on("layeradd", function(){
            resetLabels([layer_Riverland_biosphere_2]);
        });
        map.on("layerremove", function(){
            resetLabels([layer_Riverland_biosphere_2]);
        });
        </script>      
		<div class="gpi-legend">
  <h3>Grazing pressure index</h3>

  <div class="gpi-ramp"></div>

  <div class="legend-labels">
    <span>Low</span>
    <span>Moderate</span>
    <span>High</span>
  </div>

  <div class="legend-values">
    <span>0</span>
    <span>0.24</span>
    <span>0.47</span>
  </div>

  <div class="gpi-note">
    Darker red indicates greater inferred grazing pressure associated with persistent or nearby artificial water points.
  </div>
</div>
    </body>
</html>
